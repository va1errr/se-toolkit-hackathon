services:
  qwen-code-api:
    build:
      context: .
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}

    ports:
      - "${HOST_ADDRESS:-127.0.0.1}:${HOST_PORT:-8080}:${PORT:-8080}"

    volumes:
      - ~/.qwen:/mnt/qwen-creds:ro

    environment:
      - PORT=${PORT:-8080}
      - ADDRESS=${ADDRESS:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-error}
      - MAX_RETRIES=${MAX_RETRIES:-5}
      - RETRY_DELAY_MS=${RETRY_DELAY_MS:-1000}
      - QWEN_CODE_AUTH_USE=${QWEN_CODE_AUTH_USE:-true}
      - QWEN_CODE_API_KEY=${QWEN_CODE_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-coder-model}
      - LOG_REQUESTS=${LOG_REQUESTS:-true}

    restart: unless-stopped

    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - |
          import urllib.request
          req = urllib.request.Request(
              'http://localhost:${PORT:-8080}/health',
              headers={'X-API-Key': '${QWEN_CODE_API_KEY:-}'}
          )
          urllib.request.urlopen(req)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
